AllCops:
  TargetRubyVersion: 3.3.6
  NewCops: enable
  SuggestExtensions: false
  Exclude:
   - 'cache/**/*'
   - 'vendor/**/*'
   - 'vendor/bundle/**/*'
   - 'lib/us_quality_core_test_kit/generated/**/*'
   - 'lib/us_quality_core_test_kit/client/generated/**/*'
   - 'client-example-resources/*'

Style/Documentation:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Layout/LineLength:
  Enabled: false

Style/SafeNavigationChainLength:
  Enabled: false
